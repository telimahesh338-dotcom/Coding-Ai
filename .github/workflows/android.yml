name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          cp local.properties app/local.properties

      - name: Build with Gradle
        run: gradle assembleDebug --stacktrace --info --no-daemon -Pandroid.builder.sdkDownload=true -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" -Proom.schemaLocation="$PWD/app/schemas"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codebot-debug-apk
          path: app/build/outputs/apk/debug/*.apk
        continue-on-error: true
